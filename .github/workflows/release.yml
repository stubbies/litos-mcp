name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GORELEASER_TARGET: linux
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/
          if-no-files-found: error

  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GORELEASER_TARGET: darwin
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin
          path: dist/
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist-linux

      - uses: actions/download-artifact@v4
        with:
          name: dist-darwin
          path: dist-darwin

      - name: Stage release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          shopt -s nullglob
          files=(dist-linux/litos-mcp_*.tar.gz dist-linux/litos-mcp_*.zip dist-darwin/litos-mcp_*.tar.gz dist-darwin/litos-mcp_*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no release archives found" >&2
            exit 1
          fi
          cp "${files[@]}" release-artifacts/
          ls -la release-artifacts/

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean -f .goreleaser.publish.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
